<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LK Creativa</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: linear-gradient(135deg, #0d1b3e, #1e3fa8);
}

.hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px;
}

h1 {
    font-size: 48px;
    margin-bottom: 20px;
}

p {
    font-size: 18px;
    max-width: 600px;
    line-height: 1.6;
}

.buttons {
    margin-top: 30px;
}

button {
    background: transparent;
    border: 1px solid #f5c542;
    color: #f5c542;
    padding: 12px 20px;
    margin-right: 10px;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #f5c542;
    color: black;
}
</style>

</head>

<body>

<div class="hero">
    <h1>Strategic Partnerships Across Borders</h1>

    <p>
        LK Creativa connects businesses across international markets through 
        professional development, language programs, and institutional collaboration.
    </p>

    <div class="buttons">
        <button onclick="window.location.href='mailto:info@lkcreativa.com'">
            Contact Us
        </button>

        <button onclick="window.location.href='https://lkcreativa.com'">
            Visit Website
        </button>
    </div>
</div>

</body>
</html>
